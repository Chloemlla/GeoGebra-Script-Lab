<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./icon/icon.png">
    <link rel="shortcut icon" type="image/png" href="./icon/icon.png">
    <link rel="apple-touch-icon" href="./icon/icon.png">
    <meta name="theme-color" content="#163fa4">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-eval' blob: https://www.geogebra.org https://*.geogebra.org; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https://www.geogebra.org https://*.geogebra.org; form-action 'self'; upgrade-insecure-requests"
    >
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="source-repository" content="https://github.com/Chloemlla/GeoGebra-Script-Lab">
    <meta
        name="source-repository-verification"
        content="github-origin:github.com/Chloemlla/GeoGebra-Script-Lab"
    >
    <meta
        name="description"
        content="GeoGebra 交互式绘图工作台，支持脚本编辑、实时画布、自由点同步回写与结果导出。"
    >
    <title>GeoGebra 几何脚本工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Avenir Next', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #f7f1e6;
        }
        
        #root {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
    <!-- GeoGebra 官方 API -->
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
</body>
</html>
