name: Build And Upload Artifact

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: geogebra-script-lab-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14

  rust-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: rust-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock', 'backend/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Build Rust backend
        run: cargo check

  docker-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_label: backend-only
            docker_target: backend-runtime
            artifact_prefix: geograba-backend-only-image
          - image_label: fullstack
            docker_target: fullstack-runtime
            artifact_prefix: geograba-fullstack-image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image_label }} image archive
        run: |
          docker buildx build \
            --file Dockerfile \
            --target ${{ matrix.docker_target }} \
            --tag geograba:${{ matrix.image_label }}-${{ github.sha }} \
            --output type=docker,dest=/tmp/${{ matrix.image_label }}.tar \
            .

      - name: Upload ${{ matrix.image_label }} image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-${{ github.sha }}
          path: /tmp/${{ matrix.image_label }}.tar
          if-no-files-found: error
          retention-days: 14
